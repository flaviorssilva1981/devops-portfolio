apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portfolio
  namespace: devops-portfolio
  labels:
    app: devops-portfolio
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: devops-portfolio
  template:
    metadata:
      labels:
        app: devops-portfolio
    spec:
      # Distribui os pods entre nodes/zonas disponíveis no OKE
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: devops-portfolio
      containers:
        - name: devops-portfolio
          # A pipeline de CI/CD (.github/workflows/ci-cd.yml) sobrescreve esta tag
          # via `kubectl set image` a cada push, usando o SHA curto do commit.
          image: docker.io/flaviorssilva/devops-portfolio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
      # imagePullSecrets:
      #   - name: dockerhub-secret   # necessário apenas se o repositório do Docker Hub não for público
