name: CI/CD - Build, Push e Deploy no OKE

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE_NAME: devops-portfolio
  NAMESPACE: devops-portfolio
  DEPLOYMENT: devops-portfolio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Só executa se o secret KUBE_CONFIG estiver configurado no repositório.
    if: ${{ vars.SKIP_DEPLOY != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configurar kubeconfig (ServiceAccount com acesso restrito ao namespace)
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Aplicar manifests (RBAC restrito ao namespace devops-portfolio)
        run: |
          kubectl apply -n ${{ env.NAMESPACE }} -f k8s/deployment.yaml
          kubectl apply -n ${{ env.NAMESPACE }} -f k8s/service.yaml
          kubectl apply -n ${{ env.NAMESPACE }} -f k8s/ingress.yaml
          kubectl apply -n ${{ env.NAMESPACE }} -f k8s/hpa.yaml

      - name: Atualizar imagem e aguardar rollout
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            devops-portfolio=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} -n ${{ env.NAMESPACE }} --timeout=120s
